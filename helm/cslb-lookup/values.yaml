replicaCount: 1

image:
  repository: cslb-lookup
  tag: latest
  pullPolicy: IfNotPresent

# AKS deployment: use LoadBalancer to get a public IP exposed to the internet.
# The Azure LB will assign an external IP automatically.
service:
  type: LoadBalancer
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cslb-api.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce

config:
  dataSource: csv
  databasePath: /data/licenses.db

secrets:
  apiKey: ""

csvRefresh:
  enabled: true
  schedule: "0 6 * * *"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 80

nodeSelector: {}
tolerations: []
affinity: {}
