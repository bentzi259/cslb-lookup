name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 310859635502.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: cslb-lookup
  ACR_REGISTRY: cslblookupcr.azurecr.io
  ACR_REPOSITORY: cslb-lookup
  EKS_CLUSTER: carrify-staging
  AKS_CLUSTER: general-cluster
  AKS_RESOURCE_GROUP: k8s-rg
  K8S_NAMESPACE: cslb-lookup

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR + ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:staging-${{ steps.meta.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:prod-${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging (carrify-staging EKS)
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Helm upgrade
        run: |
          helm upgrade --install cslb-lookup ./helm/cslb-lookup \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=staging-${{ needs.build.outputs.tag }} \
            --set image.pullPolicy=IfNotPresent \
            --set service.type=ClusterIP \
            --set persistence.storageClass=gp2 \
            --set persistence.size=2Gi \
            --set secrets.apiKey=${{ secrets.STAGING_API_KEY }} \
            --set csvRefresh.enabled=true \
            --set csvRefresh.schedule="0 6 * * *" \
            --wait --timeout 5m

      - name: Smoke test
        run: |
          kubectl rollout status deployment/cslb-lookup -n ${{ env.K8S_NAMESPACE }} --timeout=2m
          kubectl port-forward -n ${{ env.K8S_NAMESPACE }} svc/cslb-lookup 18001:8000 &
          PF_PID=$!
          sleep 5
          STATUS=$(curl -s http://localhost:18001/health | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
          kill $PF_PID 2>/dev/null || true
          if [ "$STATUS" != "healthy" ]; then
            echo "Staging health check failed: $STATUS"
            exit 1
          fi
          echo "Staging health: OK"

  deploy-production:
    name: Deploy to production (general-cluster AKS)
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}

      - name: Helm upgrade
        run: |
          helm upgrade --install cslb-lookup ./helm/cslb-lookup \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }} \
            --set image.tag=prod-${{ needs.build.outputs.tag }} \
            --set image.pullPolicy=IfNotPresent \
            --set service.type=LoadBalancer \
            --set persistence.size=2Gi \
            --set secrets.apiKey=${{ secrets.PROD_API_KEY }} \
            --set csvRefresh.enabled=true \
            --set csvRefresh.schedule="0 6 * * *" \
            --wait --timeout 5m

      - name: Verify rollout
        run: kubectl rollout status deployment/cslb-lookup -n ${{ env.K8S_NAMESPACE }} --timeout=2m
